services:
  db:
    image: mysql:8.0
    container_name: transandina_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootPassword
    volumes:
      - ./mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3307:3306"

  app:
    build: ./frontend-service
    container_name: welcome_app
    ports:
      - "8088:80"
    depends_on:
      - db